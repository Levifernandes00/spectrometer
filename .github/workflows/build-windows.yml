name: Build Spectrometer Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    paths:
      - "src/**"
      - "packaging/**"
      - "requirements*.txt"
      - "config.example.json"
      - ".github/workflows/build-windows.yml"
  pull_request:
    paths:
      - "src/**"
      - "packaging/**"
      - "requirements*.txt"
      - "config.example.json"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-build.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller packaging/spectrometer.spec --noconfirm --clean
          cp config.example.json dist/Spectrometer/
          cp packaging/WINDOWS_README.txt dist/Spectrometer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectrometer-windows
          path: dist/Spectrometer/
          if-no-files-found: error

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Spectrometer/**
          generate_release_notes: true
